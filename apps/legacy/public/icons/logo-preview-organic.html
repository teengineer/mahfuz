<!DOCTYPE html>
<html>
<head>
  <title>Mahfuz — Organic Meem (Theme-Aware)</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0c1829; color: #e8dcc8; }

    .hero { display: flex; align-items: center; justify-content: center; min-height: 40vh; gap: 60px; padding: 40px; }
    .grid { display: grid; gap: 1px; background: #1a2a3a; }
    .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 48px 24px; }
    .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.35; }
    h2 { text-align: center; padding: 40px 24px 0; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.25; }
    .mock-headers { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #1a2a3a; }
    .mock-header { display: flex; align-items: center; gap: 12px; padding: 16px 24px; height: 64px; border-bottom: 1px solid rgba(128,128,128,0.15); }
    .mock-header .name { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }

    /* Theme variables */
    .theme-light {
      --logo-g1: #484848; --logo-g2: #2c2c2c; --logo-g3: #1d1d1f; --logo-g4: #111111; --logo-hl: #555555;
    }
    .theme-sepia {
      --logo-g1: #7a6652; --logo-g2: #5c4a36; --logo-g3: #4a3728; --logo-g4: #3a2a1c; --logo-hl: #96836e;
    }
    .theme-dark {
      --logo-g1: #f0e6d4; --logo-g2: #d4c4a8; --logo-g3: #c0ad8e; --logo-g4: #a89478; --logo-hl: #f5efe3;
    }
    .theme-dimmed {
      --logo-g1: #a8b2bc; --logo-g2: #8b949e; --logo-g3: #768390; --logo-g4: #636e7b; --logo-hl: #bec6ce;
    }
  </style>

  <h2>Theme-Aware Logo</h2>
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="cell theme-dark" style="background: #1a1a1a;" id="hero-dark"></div>
    <div class="cell theme-light" style="background: #f5f5f7;" id="hero-light"></div>
    <div class="cell theme-sepia" style="background: #f5ead6;" id="hero-sepia"></div>
    <div class="cell theme-dimmed" style="background: #22272e;" id="hero-dimmed"></div>
  </div>

    document.getElementById('hero-dark').innerHTML = meemSVG(80, 119, 'dark') + '<span class="label" style="color:#e5e5e5">Dark</span>';

    document.getElementById('hero-dimmed').innerHTML = meemSVG(80, 119, 'dimmed') + '<span class="label" style="color:#d0d7de">Dimmed</span>';
  </script>

    <div class="mock-header theme-sepia" style="background: #f5ead6;" id="hdr-sepia"></div>
    <div class="mock-header theme-dimmed" style="background: #22272e;" id="hdr-dimmed"></div>
  </div>

  </script>
