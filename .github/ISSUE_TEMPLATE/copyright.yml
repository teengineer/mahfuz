name: "Telif Hakki Bildirimi"
description: "Telif hakki ihlali bildirimi icin bu formu kullanin."
title: "[Telif] "
labels: ["telif", "oncelikli"]
body:
  - type: markdown
    attributes:
      value: |
        ## Telif Hakki Bildirimi

        Mahfuz, Kur'an-i Kerim'e erisimi kolaylastirmak amaciyla gelistirilen acik kaynakli bir projedir. Iceriklerimizin tamami, kaynaklarina atifta bulunularak kullanilmaktadir.

        Telif hakki ihlaline konu oldugunu dusundugunuz bir icerik varsa asagidaki formu doldurarak bize bildirin. Basvurunuz en kisa surede degerlendirilecektir.

  - type: input
    id: name
    attributes:
      label: "Ad Soyad / Kurum"
      description: "Basvuru sahibinin adi veya temsil ettigi kurum"
      placeholder: "orn. Prof. Dr. Ahmet Yilmaz / XYZ Yayinevi"
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: "Iletisim E-postasi"
      description: "Size geri donus yapabilmemiz icin e-posta adresiniz"
      placeholder: "ornek@email.com"
    validations:
      required: true

  - type: dropdown
    id: content-type
    attributes:
      label: "Icerik Turu"
      description: "Telif hakkina konu olan icerik turu"
      options:
        - "Meal / Ceviri metni"
        - "Yazi tipi / Font"
        - "Ses / Tilavet kaydi"
        - "Gorsel / Tasarim"
        - "Diger"
    validations:
      required: true

  - type: input
    id: content-name
    attributes:
      label: "Ilgili Icerik"
      description: "Hangi meal, yazi tipi veya icerik ile ilgili?"
      placeholder: "orn. Omer Celik Meali, KFGQPC Uthmani Hafs fontu"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Aciklama"
      description: "Telif hakki iddiasinin detaylari. Hangi icerik, nerede kullaniliyor, hak sahipligi bilgisi."
      placeholder: |
        - Hangi icerik telif hakkina konu?
        - Hak sahipligi nasil kanitlanabilir?
        - Uygulamada nerede kullaniliyor?
    validations:
      required: true

  - type: dropdown
    id: action-requested
    attributes:
      label: "Talep Edilen Islem"
      description: "Bu icerik icin ne yapilmasini istiyorsunuz?"
      options:
        - "Icerigin kaldirilmasi"
        - "Kaynak atfinin duzeltilmesi / eklenmesi"
        - "Lisans kosullarinin guncellenmesi"
        - "Iletisime gecilmesi (oncelikle gorusmek istiyorum)"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: "Destekleyici Belge / Link"
      description: "Hak sahipliginizi gosteren belge, link veya referans (varsa)"
      placeholder: "orn. Yayinevi sozlesmesi, ISBN, resmi web sitesi linki"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Beyan"
      description: "Asagidaki beyanlari onaylayin"
      options:
        - label: "Bu bildirimde yer alan bilgilerin dogru oldugunu beyan ederim."
          required: true
        - label: "Ilgili icerik uzerinde telif hakki sahibi veya yetkili temsilcisi oldugumu beyan ederim."
          required: true
